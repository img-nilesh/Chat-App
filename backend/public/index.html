<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Chat</title>
</head>
<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5;">

    <div id="nameOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h2 style="margin-top: 0; color: #333;">Welcome to Chat</h2>
            <p style="color: #666;">Please enter your name to join:</p>
            <input id="nameInput" type="text" placeholder="Your Name" style="padding: 10px; width: 220px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px;">
            <br>
            <button id="joinBtn" style="padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;">Join Chat</button>
        </div>
    </div>

    <h1>Chatting</h1>

    <div style="display: flex; gap: 20px; width: 100%; max-width: 600px; justify-content: center;">
        <div id="sidebar" style="display: flex; flex-direction: column; gap: 20px; width: 150px;">
            <div id="rooms" style="display: flex; flex-direction: column; gap: 10px;">
                <strong style="color: #333;">Rooms</strong>
                <button id="group1Btn" style="padding: 8px; cursor: pointer;">Group 1</button>
                <button id="group2Btn" style="padding: 8px; cursor: pointer;">Group 2</button>
            </div>
            <div id="users" style="display: flex; flex-direction: column; gap: 10px;">
                <strong style="color: #333;">Online Users</strong>
                <div id="userList" style="display: flex; flex-direction: column; gap: 5px;"></div>
            </div>
            <div id="currentRoomDisplay" style="margin-top: 10px; font-size: 13px; font-weight: bold; color: #007bff;">Chatting: Global</div>
        </div>
    
        <div id="chatContainer" style="position: relative; overflow-y: auto; width: 400px; height: 500px; border: 1px solid #ccc; border-radius: 8px; background: white; padding-bottom: 60px;">
            <div id="allMessage" style="padding: 10px;"></div>

            <h5 id="typing" style="position: absolute; bottom: 55px; left: 10px; color: #28a745; margin: 0; visibility: hidden; font-style: italic;">Someone is typing...</h5>
            
            <div style="position: absolute; bottom: 0; width: 100%; height: 50px; background: #f8f9fa; border-top: 1px solid #eee; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
                <input id="message" type="text" placeholder="Type a message..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <button id="sendBtn" style="margin-left: 8px; padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;">Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();

        const sendBtn = document.getElementById('sendBtn');
        const message = document.getElementById('message');
        const allMessage = document.getElementById('allMessage');
        const chatContainer = document.getElementById('chatContainer');
        const group1 = document.getElementById('group1Btn');
        const group2 = document.getElementById('group2Btn');
        const userListDiv = document.getElementById('userList');
        const currentRoomDisplay = document.getElementById('currentRoomDisplay');
        const typingIndicator = document.getElementById('typing');
        const nameOverlay = document.getElementById('nameOverlay');
        const nameInput = document.getElementById('nameInput');
        const joinBtn = document.getElementById('joinBtn');

        let userName = "";
        let currentRoom = "";
        let targetSocketId = null;
        let targetName = "";

        socket.on('connect', () => {
            console.log("Connected with ID:", socket.id);
            if (userName) socket.emit('user-joined', userName);
        });

        const joinChat = () => {
            const name = nameInput.value.trim();
            if (name) {
                userName = name;
                nameOverlay.style.display = 'none';
                socket.emit('user-joined', userName);
                message.focus();
            } else {
                alert("Please enter a name!");
            }
        };

        joinBtn.addEventListener('click', joinChat);
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinChat();
        });

        const scrollToBottom = () => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        socket.on('user-list', (users) => {
            userListDiv.innerHTML = '';
            users.forEach(user => {
                if (user.id !== socket.id) {
                    const btn = document.createElement('button');
                    btn.textContent = user.name;
                    btn.style.padding = '5px';
                    btn.style.cursor = 'pointer';
                    btn.style.textAlign = 'left';
                    btn.style.border = '1px solid #ddd';
                    btn.style.borderRadius = '4px';
                    btn.style.background = targetSocketId === user.id ? '#e7f3ff' : '#fff';
                    btn.onclick = () => startPrivateChat(user.id, user.name);
                    userListDiv.appendChild(btn);
                }
            });
        });

        const startPrivateChat = (id, name) => {
            targetSocketId = id;
            targetName = name;
            currentRoom = ""; // Clear room if in private chat
            currentRoomDisplay.textContent = `Private: ${name}`;
            allMessage.innerHTML = `<div style="color: #666; font-style: italic; text-align: center; margin-bottom: 10px;">--- Private chat with ${name} ---</div>`;
            // Refresh user list to show active selection
            socket.emit('get-user-list'); // Optional, just re-rendering locally is enough usually
            const buttons = userListDiv.querySelectorAll('button');
            buttons.forEach(b => b.style.background = b.textContent === name ? '#e7f3ff' : '#fff');
        };

        socket.on('user-connected', (name) => {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: green; font-style: italic;">🟢 ${name} joined</span>`;
            div.style.padding = "4px";
            allMessage.appendChild(div);
            scrollToBottom();
        });

        socket.on('user-disconnected', (name) => {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: red; font-style: italic;">🔴 ${name} left</span>`;
            div.style.padding = "4px";
            allMessage.appendChild(div);
            scrollToBottom();
        });

        socket.on('message', (data) => {
            const div = document.createElement('div');
            div.style.padding = "4px";
            div.style.marginBottom = "8px";
            const isMe = data.name === userName;
            div.innerHTML = `<strong style="color: ${isMe ? '#007bff' : '#333'}">${data.name}:</strong> ${data.message}`;
            allMessage.appendChild(div);
            scrollToBottom();
        });

        socket.on('private-message', (data) => {
            const div = document.createElement('div');
            div.style.padding = "8px";
            div.style.marginBottom = "8px";
            div.style.background = "#fff3cd";
            div.style.borderRadius = "4px";
            div.innerHTML = `<strong>[Private] ${data.from}:</strong> ${data.message}`;
            allMessage.appendChild(div);
            scrollToBottom();
        });

        socket.on('user-typing', (data) => {
            typingIndicator.textContent = `${data.name} is typing... ${data.isPrivate ? '(Private)' : ''}`;
            typingIndicator.style.visibility = "visible";
            setTimeout(() => {
                typingIndicator.style.visibility = "hidden";
            }, 2000);
        });

        group1.addEventListener('click', () => {
            currentRoom = 'group1';
            targetSocketId = null;
            currentRoomDisplay.textContent = `Room: Group 1`;
            allMessage.innerHTML = '<div style="color: #666; font-style: italic; text-align: center; margin-bottom: 10px;">--- Switched to Group 1 ---</div>';
            socket.emit('join-room', { room: currentRoom, name: userName });
        });

        group2.addEventListener('click', () => {
            currentRoom = 'group2';
            targetSocketId = null;
            currentRoomDisplay.textContent = `Room: Group 2`;
            allMessage.innerHTML = '<div style="color: #666; font-style: italic; text-align: center; margin-bottom: 10px;">--- Switched to Group 2 ---</div>';
            socket.emit('join-room', { room: currentRoom, name: userName });
        });

        message.addEventListener('input', () => {
            socket.emit('typing', { name: userName, room: currentRoom, targetId: targetSocketId });
        });

        sendBtn.addEventListener('click', () => {
            const msg = message.value.trim();
            if (!msg) return;
            
            if (targetSocketId) {
                socket.emit('user-message', { name: userName, message: msg, targetId: targetSocketId, targetName: targetName });
            } else {
                socket.emit('user-message', { name: userName, message: msg, room: currentRoom });
            }
            message.value = '';
        });

        message.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

    </script>
</body>
</html>
