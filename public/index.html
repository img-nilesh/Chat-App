<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket</title>
</head>
<body>
    <h1>Chatting</h1>

    <div style="display: flex; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 10px; width: 100px;">
            <button id="ankitBtn">Ankit</button>
            <button id="rahulBtn">Rahul</button>
            <button id="group1Btn">Group 1</button>
            <button id="group2Btn">Group 2</button>
        </div>
    
        <div style="position: relative; overflow-y: auto; width: 300px; height: 400px; border: 1px solid black; padding-bottom: 40px;">
            <div id="allMessage"></div>

            <h5 id="typing" style="position: absolute; bottom: 0; color: green; visibility: hidden;">Typing...</h5>
            <div style="position: absolute; bottom: 0; width: 100%; background: white;">
                <input id="message" type="text" style="width: 70%;">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>


    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();

        const sendBtn = document.getElementById('sendBtn');
        const message = document.getElementById('message');
        const allMessage = document.getElementById('allMessage');
        const group1 = document.getElementById('group1Btn');
        const group2 = document.getElementById('group2Btn');

        let userName = "";
        let currentRoom = "";

        socket.on('connect', () => {
            console.log("Connected with ID:", socket.id);
            console.log("Session recovered:", socket.recovered);
            userName = prompt("Enter your name: ") || "Anonymous";

            socket.emit('user-joined', userName);

        });
        
        socket.on('user-connected', (name) => {
            const div = document.createElement('div');
            div.textContent = `🟢 ${name} joined the chat`;
            div.style.padding = "4px";
            div.style.color = "green";
            div.style.fontStyle = "italic";
            allMessage.appendChild(div);
        });

        socket.on('user-disconnected', (name) => {
            const div = document.createElement('div');
            div.textContent = `🔴 ${name} left the chat`;
            div.style.padding = "4px";
            div.style.color = "red";
            div.style.fontStyle = "italic";
            allMessage.appendChild(div);
        });

        socket.on('message', (data) => {
            const div = document.createElement('div');
            div.textContent = `${data.name}: ${data.message}`;
            div.style.padding = "4px";
            allMessage.appendChild(div);
        })

        socket.on('user-typing', (name) => {
            const typing = document.getElementById('typing');
            typing.textContent = `${name} is typing...`;
            typing.style.visibility = "visible";

            setTimeout(() => {
                typing.style.visibility = "hidden";
            }, 2000);
        });

        group1.addEventListener(('click'), () => {
            currentRoom = 'group1';
            socket.emit('join-room', { room: currentRoom, name: userName });
        });

        group2.addEventListener(('click'), () => {
            currentRoom = 'group2';
            socket.emit('join-room', { room: currentRoom, name: userName });
        });

        message.addEventListener('input', () => {
            socket.emit('typing', userName);
        });

        sendBtn.addEventListener('click', () => {
            const msg = message.value;
            socket.emit('user-message', { name: userName, message: msg });
            message.value = '';
        });

    </script>
</body>
</html>
